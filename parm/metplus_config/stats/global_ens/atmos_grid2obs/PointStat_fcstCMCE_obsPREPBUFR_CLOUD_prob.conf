[config]

LOG_METPLUS =

OUTPUT_BASE = {ENV[output_base]}

# time looping - options are INIT, VALID, RETRO, and REALTIME
LOOP_BY = VALID

# Format of VALID_BEG and VALID_END
VALID_TIME_FMT = %Y%m%d%H

# Start time for METplus run
VALID_BEG = {ENV[vday]}{ENV[vbeg]}

# End time for METplus run
VALID_END = {ENV[vday]}{ENV[vend]}

METPLUS_PATH = {ENV[METPLUS_PATH]}

#conf and config path 
#MET_CONFIG = {ENV[MET_CONFIG]}

# Increment between METplus runs in seconds. Must be >= 60
# 86400 sec=24h
VALID_INCREMENT = {ENV[valid_increment]}

# Options are times, processes
# times = run all items in the PROCESS_LIST for a single initialization
# time, then repeat until all times have been evaluated.
# processes = run each item in the PROCESS_LIST for all times
#   specified, then repeat for the next item in the PROCESS_LIST.
STAT_ANALYSIS_RUNTIME_FREQ = RUN_ONCE_PER_INIT_OR_VALID

# List of applications to run
PROCESS_LIST = PointStat

# List of variables to compare
FCST_POINT_STAT_VAR1_NAME = TCDC_L0_ENS_FREQ_lt10
FCST_POINT_STAT_VAR1_LEVELS = (*,*)
OBS_POINT_STAT_VAR1_NAME = TCDC
OBS_POINT_STAT_VAR1_LEVELS = L0
OBS_POINT_STAT_VAR1_THRESH = lt10

FCST_POINT_STAT_VAR2_NAME = TCDC_L0_ENS_FREQ_ge10
FCST_POINT_STAT_VAR2_LEVELS = (*,*)
OBS_POINT_STAT_VAR2_NAME = TCDC
OBS_POINT_STAT_VAR2_LEVELS = L0
OBS_POINT_STAT_VAR2_THRESH = ge10

FCST_POINT_STAT_VAR3_NAME = TCDC_L0_ENS_FREQ_ge50
FCST_POINT_STAT_VAR3_LEVELS = (*,*)
OBS_POINT_STAT_VAR3_NAME = TCDC
OBS_POINT_STAT_VAR3_LEVELS = L0
OBS_POINT_STAT_VAR3_THRESH = ge50

FCST_POINT_STAT_VAR4_NAME = TCDC_L0_ENS_FREQ_ge90
FCST_POINT_STAT_VAR4_LEVELS = (*,*)
OBS_POINT_STAT_VAR4_NAME = TCDC
OBS_POINT_STAT_VAR4_LEVELS = L0
OBS_POINT_STAT_VAR4_THRESH = ge90

FCST_POINT_STAT_VAR5_NAME = CAPE_L0_ENS_FREQ_ge250
FCST_POINT_STAT_VAR5_LEVELS = (*,*)
FCST_POINT_STAT_VAR5_OPTIONS = cnt_thresh = [ NA ]; cnt_logic = INTERSECTION
OBS_POINT_STAT_VAR5_NAME = CAPE
OBS_POINT_STAT_VAR5_LEVELS = L0
OBS_POINT_STAT_VAR5_THRESH = ge250
OBS_POINT_STAT_VAR5_OPTIONS = cnt_thresh = [ >0 ]; cnt_logic = INTERSECTION

FCST_POINT_STAT_VAR6_NAME = CAPE_L0_ENS_FREQ_ge500
FCST_POINT_STAT_VAR6_LEVELS = (*,*)
FCST_POINT_STAT_VAR6_OPTIONS = cnt_thresh = [ NA ]; cnt_logic = INTERSECTION
OBS_POINT_STAT_VAR6_NAME = CAPE
OBS_POINT_STAT_VAR6_LEVELS = L0
OBS_POINT_STAT_VAR6_THRESH = ge500
OBS_POINT_STAT_VAR6_OPTIONS = cnt_thresh = [ >0 ]; cnt_logic = INTERSECTION

FCST_POINT_STAT_VAR7_NAME = CAPE_L0_ENS_FREQ_ge1000
FCST_POINT_STAT_VAR7_LEVELS = (*,*)
FCST_POINT_STAT_VAR7_OPTIONS = cnt_thresh = [ NA ]; cnt_logic = INTERSECTION
OBS_POINT_STAT_VAR7_NAME = CAPE
OBS_POINT_STAT_VAR7_LEVELS = L0
OBS_POINT_STAT_VAR7_THRESH = ge1000
OBS_POINT_STAT_VAR7_OPTIONS = cnt_thresh = [ >0 ]; cnt_logic = INTERSECTION

FCST_POINT_STAT_VAR8_NAME = CAPE_L0_ENS_FREQ_ge2000
FCST_POINT_STAT_VAR8_LEVELS = (*,*)
FCST_POINT_STAT_VAR8_OPTIONS = cnt_thresh = [ NA ]; cnt_logic = INTERSECTION
OBS_POINT_STAT_VAR8_NAME = CAPE
OBS_POINT_STAT_VAR8_LEVELS = L0
OBS_POINT_STAT_VAR8_THRESH = ge2000
OBS_POINT_STAT_VAR8_OPTIONS = cnt_thresh = [ >0 ]; cnt_logic = INTERSECTION

FCST_IS_PROB = true
FCST_GRID_STAT_PROB_THRESH = ==0.1

lead = {ENV[lead]} 
LEAD_SEQ = {lead} 
# Other environment parameters passed from scripts 
MODEL = {ENV[MODEL]}
model = {ENV[model]}

#######################################################
POINT_STAT_REGRID_TO_GRID = NONE

OBTYPE = PREPBUFR
MASKPATH = {ENV[maskpath]}
TMP_DIR = {OUTPUT_BASE}/tmp

POINT_STAT_DESC = NA
POINT_STAT_REGRID_METHOD = NEAREST
POINT_STAT_REGRID_WIDTH = 1
POINT_STAT_REGRID_VLD_THRESH = 0.5
POINT_STAT_REGRID_SHAPE = SQUARE

POINT_STAT_MESSAGE_TYPE = ADPSFC, SFCSHP, MSONET, ADPUPA 

OBS_POINT_STAT_WINDOW_BEGIN = -5400
OBS_POINT_STAT_WINDOW_END = 5400

POINT_STAT_GRID = G003
POINT_STAT_POLY = {MASKPATH}/G003_NHEM.nc, {MASKPATH}/G003_SHEM.nc, {MASKPATH}/G003_TROPICS.nc, {MASKPATH}/Bukovsky_G212_CONUS.nc, {MASKPATH}/Bukovsky_G212_CONUS_East.nc, {MASKPATH}/Bukovsky_G212_CONUS_West.nc, {MASKPATH}/Bukovsky_G212_CONUS_Central.nc, {MASKPATH}/Bukovsky_G212_CONUS_South.nc, {MASKPATH}/Alaska_G003.nc

POINT_STAT_CI_ALPHA = 0.05

POINT_STAT_INTERP_FIELD = BOTH
POINT_STAT_INTERP_VLD_THRESH = 1.0
POINT_STAT_INTERP_SHAPE = SQUARE
POINT_STAT_INTERP_TYPE_METHOD = NEAREST
POINT_STAT_INTERP_TYPE_WIDTH = 1

POINT_STAT_OUTPUT_FLAG_FHO = NONE
POINT_STAT_OUTPUT_FLAG_CTC = NONE
POINT_STAT_OUTPUT_FLAG_CTS = NONE
POINT_STAT_OUTPUT_FLAG_MCTC = NONE
POINT_STAT_OUTPUT_FLAG_MCTS = NONE
POINT_STAT_OUTPUT_FLAG_CNT = NONE
POINT_STAT_OUTPUT_FLAG_SL1L2 = NONE
POINT_STAT_OUTPUT_FLAG_SAL1L2 = NONE
POINT_STAT_OUTPUT_FLAG_VL1L2 = NONE
POINT_STAT_OUTPUT_FLAG_VAL1L2 = NONE
POINT_STAT_OUTPUT_FLAG_VCNT = NONE
POINT_STAT_OUTPUT_FLAG_PCT = STAT
POINT_STAT_OUTPUT_FLAG_PSTD = STAT
POINT_STAT_OUTPUT_FLAG_PJC = NONE
POINT_STAT_OUTPUT_FLAG_PRC = NONE
POINT_STAT_OUTPUT_FLAG_ECLV = NONE
POINT_STAT_OUTPUT_FLAG_NBRCTC = NONE
POINT_STAT_OUTPUT_FLAG_NBRCTS = NONE
POINT_STAT_OUTPUT_FLAG_NBRCNT = NONE
POINT_STAT_OUTPUT_FLAG_GRAD = NONE
POINT_STAT_OUTPUT_FLAG_DMAP = NONE

POINT_STAT_NC_PAIRS_FLAG_LATLON = TRUE
POINT_STAT_NC_PAIRS_FLAG_RAW = TRUE
POINT_STAT_NC_PAIRS_FLAG_DIFF = TRUE
POINT_STAT_NC_PAIRS_FLAG_CLIMO = 
POINT_STAT_NC_PAIRS_FLAG_CLIMO_CDP = FALSE
POINT_STAT_NC_PAIRS_FLAG_WEIGHT = FALSE
POINT_STAT_NC_PAIRS_FLAG_NBRHD = FALSE
POINT_STAT_NC_PAIRS_FLAG_FOURIER = FALSE
POINT_STAT_NC_PAIRS_FLAG_GRADIENT = FALSE
POINT_STAT_NC_PAIRS_FLAG_DISTANCE_MAP = FALSE
POINT_STAT_NC_PAIRS_FLAG_APPLY_MASK = TRUE

###############################################################
modelhead = {ENV[modelhead]}
modelpath = {ENV[modelpath]}
modelgrid = {ENV[modelgrid]}
modeltail = {ENV[modeltail]}

prepbufrpath = {ENV[prepbufrpath]}
prepbufrhead = {ENV[prepbufrhead]}
prepbufrgrid = {ENV[prepbufrgrid]}

# Location of point_stat MET config file
POINT_STAT_CONFIG_FILE = {METPLUS_BASE}/parm/met_config/PointStatConfig_wrapped

# Define the name of final metplus conf
METPLUS_CONF = {OUTPUT_BASE}/final_{model}_prob_cloud_{ENV[vbeg]}.conf

POINT_STAT_OUTPUT_PREFIX = {MODEL}_CLOUD_PROB_BIN1 

[dir]
FCST_POINT_STAT_INPUT_DIR = {OUTPUT_BASE}/stat/{model}
OBS_POINT_STAT_INPUT_DIR = {prepbufrpath}
POINT_STAT_OUTPUT_DIR = {OUTPUT_BASE}/stat/{model}

[filename_templates]
FCST_POINT_STAT_INPUT_TEMPLATE = GenEnsProd_{MODEL}_CLOUD_BIN1_FHR{lead?fmt=%3H}_{valid?fmt=%Y%m%d}_{valid?fmt=%H}0000V_ens.nc
OBS_POINT_STAT_INPUT_TEMPLATE = atmos.{valid?fmt=%Y%m%d}/gefs/{prepbufrhead}.t{valid?fmt=%H}z.{prepbufrgrid}

POINT_STAT_MET_CONFIG_OVERRIDES = duplicate_flag = UNIQUE; obs_summary = NEAREST; 
