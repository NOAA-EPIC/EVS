[config]
#### Input
INPUT_BASE = {ENV[DATA]}/{ENV[VERIF_CASE]}_{ENV[STEP]}
FCST_GRID_STAT_INPUT_DIR = {INPUT_BASE}/METplus_output
FCST_GRID_STAT_INPUT_TEMPLATE = {ENV[RUN]}.{ENV[DATE]}/{MODEL}/{ENV[VERIF_CASE]}/weekly_pcp_combine_{ENV[VERIF_TYPE]}_Precip_init{init?fmt=%Y%m%d%H}_valid{valid?fmt=%Y%m%d%H?shift=-144H}to{valid?fmt=%Y%m%d%H}.nc
FCST_GRID_STAT_INPUT_DATATYPE = NETCDF
FCST_IS_PROB = False
OBS_GRID_STAT_INPUT_DIR = {INPUT_BASE}/METplus_output
OBS_GRID_STAT_INPUT_TEMPLATE = {ENV[RUN]}.{ENV[DATE]}/{MODEL}/{ENV[VERIF_CASE]}/weekly_pcp_combine_{ENV[VERIF_TYPE]}_CCPA_valid{valid?fmt=%Y%m%d%H?shift=-144H}to{valid?fmt=%Y%m%d%H}.nc
OBS_GRID_STAT_INPUT_DATATYPE = NETCDF
OBS_IS_PROB = False
SCRUB_STAGING_DIR = False
#### Output
OUTPUT_BASE = {ENV[job_num_work_dir]}
LOG_DIR = {OUTPUT_BASE}/logs
TMP_DIR = {ENV[MET_TMP_DIR]}
STAGING_DIR = {OUTPUT_BASE}/stage
GRID_STAT_OUTPUT_DIR = {OUTPUT_BASE}
GRID_STAT_OUTPUT_TEMPLATE = {ENV[RUN]}.{ENV[DATE]}/{MODEL}/{ENV[VERIF_CASE]}
GRID_STAT_OUTPUT_PREFIX = {ENV[VERIF_TYPE]}_{ENV[job_name]}
LOG_METPLUS = {LOG_DIR}/{ENV[JOB_GROUP]}_GridStat_fcst{MODEL}_obs{OBTYPE}_Weekly_{ENV[VERIF_CASE]}_{ENV[STEP]}_{ENV[VERIF_TYPE]}_{ENV[job_name]}_for{ENV[PEDATE]}_runon{CLOCK_TIME}.log
METPLUS_CONF = {OUTPUT_BASE}/confs/{ENV[JOB_GROUP]}_GridStat_fcst{MODEL}_obs{OBTYPE}_Weekly_{ENV[VERIF_CASE]}_{ENV[STEP]}_{ENV[VERIF_TYPE]}_{ENV[job_name]}_for{ENV[PEDATE]}_runon{CLOCK_TIME}.conf
#### METplus application
PROCESS_LIST = GridStat
#### Dates
LOOP_BY = VALID
VALID_TIME_FMT = %Y%m%d%H
VALID_BEG = {ENV[PEDATE]}{ENV[valid_hr_start]}
VALID_END = {ENV[PEDATE]}{ENV[valid_hr_end]}
VALID_INCREMENT = {ENV[valid_hr_inc]}H
#### Lead
LEAD_SEQ = {ENV[fhr_list]}
#### Variables
BOTH_VAR1_NAME = {ENV[var1_name]}
BOTH_VAR1_LEVELS = A144
BOTH_VAR1_THRESH = ge25.4, ge50.8, ge76.2, ge101.6, ge127, ge152.4, ge203.2, ge254
BOTH_VAR1_OPTIONS = set_attr_units = "mm"; set_attr_name = "APCP_WEEKLY";
#### GridStat
GRID_STAT_CONFIG_FILE = {PARM_BASE}/met_config/GridStatConfig_wrapped
GRID_STAT_ONCE_PER_FIELD = False
GRID_STAT_SKIP_IF_OUTPUT_EXISTS = False
MODEL = {ENV[MODEL]}
OBTYPE = CCPA
GRID_STAT_DESC = {GRID_STAT_REGRID_TO_GRID}
GRID_STAT_REGRID_TO_GRID = G003
GRID_STAT_REGRID_METHOD = BUDGET
GRID_STAT_REGRID_WIDTH = 2
GRID_STAT_REGRID_VLD_THRESH = 0.5
GRID_STAT_REGRID_SHAPE = SQUARE
GRID_STAT_NC_PAIRS_VAR_NAME =
GRID_STAT_CLIMO_MEAN_FIELD =
GRID_STAT_MASK_GRID =
GRID_STAT_MASK_POLY = {ENV[FIXevs]}/masks/Bukovsky_G003_CONUS.nc, {ENV[FIXevs]}/masks/Bukovsky_G003_CONUS_Central.nc, {ENV[FIXevs]}/masks/Bukovsky_G003_CONUS_East.nc, {ENV[FIXevs]}/masks/Bukovsky_G003_CONUS_West.nc, {ENV[FIXevs]}/masks/Bukovsky_G003_CONUS_South.nc
GRID_STAT_INTERP_FIELD = BOTH
GRID_STAT_INTERP_VLD_THRESH = 1.0
GRID_STAT_INTERP_SHAPE = SQUARE
GRID_STAT_INTERP_TYPE_METHOD = NEAREST
GRID_STAT_INTERP_TYPE_WIDTH = 1
GRID_STAT_NEIGHBORHOOD_WIDTH = 1, 3, 5, 7, 9, 11
GRID_STAT_NEIGHBORHOOD_SHAPE = SQUARE
GRID_STAT_NEIGHBORHOOD_COV_THRESH = >=0.5
GRID_STAT_OUTPUT_FLAG_FHO = NONE
GRID_STAT_OUTPUT_FLAG_CTC = STAT
GRID_STAT_OUTPUT_FLAG_CTS = NONE
