[config]
#### Input
INPUT_BASE = {ENV[DATA]}/{ENV[VERIF_CASE]}_{ENV[STEP]}/data
FCST_PCP_COMBINE_RUN = True
OBS_PCP_COMBINE_RUN = True
FCST_PCP_COMBINE_INPUT_DIR = {OUTPUT_BASE}
OBS_PCP_COMBINE_INPUT_DIR = {INPUT_BASE}/ccpa
FCST_PCP_COMBINE_INPUT_TEMPLATE = {ENV[RUN]}.{ENV[DATE]}/{MODEL}/{ENV[VERIF_CASE]}/gen_ens_prod_{ENV[VERIF_TYPE]}_{ENV[job_name]}_FHR{lead?fmt=%3H}_{valid?fmt=%Y%m%d}_{valid?fmt=%H}0000V_ens.nc
OBS_PCP_COMBINE_INPUT_TEMPLATE = 24hrCCPA.{valid?fmt=%Y%m%d%H}.nc
FCST_PCP_COMBINE_INPUT_DATATYPE = NETCDF
OBS_PCP_COMBINE_INPUT_DATATYPE = NETCDF
FCST_IS_PROB = False
OBS_IS_PROB = False
SCRUB_STAGING_DIR = False
#### Output
OUTPUT_BASE = {ENV[job_num_work_dir]}
FCST_PCP_COMBINE_OUTPUT_DIR = {OUTPUT_BASE}
OBS_PCP_COMBINE_OUTPUT_DIR = {OUTPUT_BASE}
LOG_DIR = {FCST_PCP_COMBINE_OUTPUT_DIR}/logs
TMP_DIR = {ENV[MET_TMP_DIR]}
STAGING_DIR = {FCST_PCP_COMBINE_OUTPUT_DIR}/stage
FCST_PCP_COMBINE_OUTPUT_TEMPLATE = {ENV[RUN]}.{ENV[DATE]}/{MODEL}/{ENV[VERIF_CASE]}/weekly_pcp_combine_{ENV[VERIF_TYPE]}_{ENV[job_name]}_init{init?fmt=%Y%m%d%H}_valid{ENV[WEEKLYSTART]}{ENV[valid_hr_start]}to{ENV[PEDATE]}{ENV[valid_hr_end]}.nc
OBS_PCP_COMBINE_OUTPUT_TEMPLATE = {ENV[RUN]}.{ENV[DATE]}/{MODEL}/{ENV[VERIF_CASE]}/weekly_pcp_combine_{ENV[VERIF_TYPE]}_CCPA_valid{ENV[WEEKLYSTART]}{ENV[valid_hr_start]}to{ENV[PEDATE]}{ENV[valid_hr_end]}.nc
LOG_METPLUS = {LOG_DIR}/{ENV[JOB_GROUP]}_PCPCombine_fcst{MODEL}_obs{OBTYPE}_{ENV[VERIF_CASE]}_{ENV[STEP]}_{ENV[VERIF_TYPE]}_{ENV[job_name]}_for{ENV[WEEK]}_runon{CLOCK_TIME}.log
METPLUS_CONF = {FCST_PCP_COMBINE_OUTPUT_DIR}/confs/{ENV[JOB_GROUP]}_PCPCombine_fcst{MODEL}_obs{OBTYPE}_{ENV[VERIF_CASE]}_{ENV[STEP]}_{ENV[VERIF_TYPE]}_{ENV[job_name]}_for{ENV[WEEK]}_runon{CLOCK_TIME}.conf
#### METplus application
PROCESS_LIST = PCPCombine
##### Dates
LOOP_BY = INIT
INIT_TIME_FMT = %Y%m%d%H
INIT_BEG = {ENV[CORRECT_INIT_DATE]}{ENV[init_hr_start]}
INIT_END = {ENV[CORRECT_INIT_DATE]}{ENV[init_hr_end]}
INIT_INCREMENT = {ENV[init_hr_inc]}H
#### Lead
LEAD_SEQ = {ENV[pcp_fhr]}
##### Variables
#### PCPCombine
PCP_COMBINE_SKIP_IF_OUTPUT_EXISTS = False
MODEL = {ENV[MODEL]}
OBTYPE = CCPA
FCST_PCP_COMBINE_METHOD = ADD
OBS_PCP_COMBINE_METHOD = ADD
FCST_PCP_COMBINE_INPUT_NAMES = {ENV[var1_name]}_06_{ENV[var1_levels]}_ENS_MEAN
OBS_PCP_COMBINE_INPUT_NAMES = APCP_A24
FCST_PCP_COMBINE_INPUT_ACCUMS = 6H
OBS_PCP_COMBINE_INPUT_ACCUMS = 24H
FCST_PCP_COMBINE_INPUT_LEVELS = {ENV[var1_levels]}
OBS_PCP_COMBINE_INPUT_LEVELS = A24
FCST_PCP_COMBINE_IS_DAILY_FILE = False
FCST_PCP_COMBINE_OUTPUT_ACCUM = {ENV[accum]}H
OBS_PCP_COMBINE_OUTPUT_ACCUM = {ENV[accum]}H
FCST_PCP_COMBINE_MIN_FORECAST = 
OBS_PCP_COMBINE_MIN_FORECAST =
FCST_PCP_COMBINE_MAX_FORECAST =
OBS_PCP_COMBINE_MAX_FORECAST = 
FCST_PCP_COMBINE_USE_ZERO_ACCUM = False
FCST_PCP_COMBINE_DATA_INTERVAL = {ENV[accum]}
OBS_PCP_COMBINE_DATA_INTERVAL = {ENV[accum]}
FCST_PCP_COMBINE_TIMES_PER_FILE =
OBS_PCP_COMBINE_TIMES_PER_FILE =
FCST_PCP_COMBINE_OUTPUT_NAME = APCP_A{ENV[accum]}
OBS_PCP_COMBINE_OUTPUT_NAME = APCP_A{ENV[accum]}
FCST_PCP_COMBINE_STAT_LIST =
OBS_PCP_COMBINE_STAT_LIST =
FCST_PCP_COMBINE_DERIVE_LOOKBACK =
OBS_PCP_COMBINE_DERIVE_LOOKBACK =
FCST_PCP_COMBINE_CONSTANT_INIT = True
