[config]

### input
FCST_POINT_STAT_INPUT_DIR = {ENV[DATA]}/gribs
FCST_POINT_STAT_INPUT_TEMPLATE = gfswave.{init?fmt=%Y%m%d}.t{init?fmt=%2H}z.global.0p25.f{lead?fmt=%3H}.grib2
FCST_POINT_STAT_INPUT_DATATYPE = GRIB2
FCST_IS_PROB = False

OBS_POINT_STAT_INPUT_DIR = {ENV[DATA]}/ncfiles
OBS_POINT_STAT_INPUT_TEMPLATE = gdas.SFCSHP.{valid?fmt=%Y%m%d%H}.nc
OBS_POINT_STAT_INPUT_DATATYPE = NETCDF_NCCF
OBS_IS_PROB = False

# directories containing climatology mean and stdev input to PointStat
    
## output
POINT_STAT_OUTPUT_DIR = {ENV[job_work_dir]}
METPLUS_CONF = {POINT_STAT_OUTPUT_DIR}/confs/metplus_final_PointStat_fcst{MODEL}_obsGDAS_climoERA5_Wave_WindDir_valid{ENV[VDATE]}{ENV[valid_hour2]}_f{ENV[flead]}.conf
LOG_METPLUS = {POINT_STAT_OUTPUT_DIR}/logs/PointStat_fcst{MODEL}_obsGDAS_climoERA5_Wave_WindDir_valid{ENV[VDATE]}{ENV[valid_hour2]}_f{ENV[flead]}.log
TMP_DIR = {ENV[MET_TMP_DIR]}
POINT_STAT_OUTPUT_TEMPLATE =
POINT_STAT_OUTPUT_PREFIX = fcst{ENV[MODNAM]}_obsGDAS_climoERA5_WindDir

## Configuration-related settings such as the process list, begin and end times, etc.
PROCESS_LIST = PointStat

# Set up times
LOOP_BY = VALID
VALID_TIME_FMT = %Y%m%d%H
VALID_BEG = {ENV[VDATE]}{ENV[valid_hour2]}
VALID_END = {ENV[VDATE]}{ENV[valid_hour2]}
VALID_INCREMENT = 100

LEAD_SEQ = {ENV[flead]}

OBS_POINT_STAT_WINDOW_BEGIN = -1800
OBS_POINT_STAT_WINDOW_END = 1800

## MET Configuration file for point_stat
POINT_STAT_CONFIG_FILE = {PARM_BASE}/met_config/PointStatConfig_wrapped

# Model/fcst and obs name, e.g. GFS, NAM, GDAS, etc.
MODEL = {ENV[MODNAM]}
OBTYPE = GDAS
POINT_STAT_DESC = "ERA5Climo"

# use all the data that passed PB2NC threshold
POINT_STAT_OBS_QUALITY_INC = 
POINT_STAT_DUPLICATE_FLAG = UNIQUE
POINT_STAT_OBS_SUMMARY = DW_MEAN

# Regrid to specified grid.  Indicate NONE if no regridding, or the grid id
# (e.g. G193)
POINT_STAT_REGRID_TO_GRID = NONE
POINT_STAT_INTERP_TYPE_METHOD = BILIN
POINT_STAT_INTERP_TYPE_WIDTH = 2
POINT_STAT_REGRID_VLD_THRESH = 0.5
POINT_STAT_REGRID_SHAPE = SQUARE
POINT_STAT_MASK_GRID = 
POINT_STAT_MASK_POLY = {ENV[FIXevs]}/masks/latlon_0p25_GLOBAL.nc
POINT_STAT_INTERP_FIELD = BOTH
POINT_STAT_INTERP_VLD_THRESH = 1.0
POINT_STAT_INTERP_SHAPE = SQUARE
POINT_STAT_INTERP_TYPE_METHOD = NEAREST
POINT_STAT_INTERP_TYPE_WIDTH = 1

# if POINT_STAT_MESSAGE_TYPE is blank, it will only look for "ADPUPA" and not find any wave vars!
POINT_STAT_MESSAGE_TYPE = SFCSHP

#FCST_VAR1_NAME = WIND
#FCST_VAR1_LEVELS = L0
#FCST_VAR1_THRESH = lt10.0, lt20.0, gt33.0, gt49.4
#OBS_VAR1_NAME = WIND
#OBS_VAR1_LEVELS = Z10
#OBS_VAR1_THRESH = lt10.0, lt20.0, gt33.0, gt49.4

##add wind direction verification
FCST_VAR1_NAME = UGRD
FCST_VAR1_LEVELS = L0
FCST_VAR2_NAME = VGRD
FCST_VAR2_LEVELS = L0
OBS_VAR1_NAME = UGRD
OBS_VAR1_LEVELS = Z10
OBS_VAR2_NAME = VGRD
OBS_VAR2_LEVELS = Z10


POINT_STAT_OUTPUT_FLAG_VL1L2 = STAT

OMP_NUM_THREADS = 1

POINT_STAT_MET_CONFIG_OVERRIDES = duplicate_flag = UNIQUE; obs_summary = NEAREST;
